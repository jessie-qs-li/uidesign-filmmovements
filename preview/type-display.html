<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 26px 24px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--vl-font-mono); font-size: 10px; color: var(--vl-fg-3); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  /* Override defaults for film-poster character */
  h1, h2, h3 { font-weight: 400; letter-spacing: -0.012em; }
  h1 { font-size: 44px; line-height: 1.0; }
  h2 { font-size: 30px; line-height: 1.1; font-style: italic; }
  h3 { font-size: 18px; line-height: 1.3; font-style: italic; color: var(--vl-fg-2); }
</style></head><body>
<div class="stack">
  <div class="row"><h1 style="margin:0">Dolly Zoom.</h1><span class="spec">Instrument Serif · 44 · Reg · h1</span></div>
  <div class="row"><h2 style="margin:0">Camera Movements</h2><span class="spec">IS · 30 · Italic · h2</span></div>
  <div class="row"><h3 style="margin:0">Learn to see what the director sees</h3><span class="spec">IS · 18 · Italic · h3</span></div>
</div>
</body></html>
