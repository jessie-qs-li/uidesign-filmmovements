<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; height: 320px; position: relative; overflow: hidden; }
  .scrim { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display:flex; align-items:center; justify-content:center; }
  .modal { width: 460px; background: var(--vl-bg-2); border: 1px solid var(--vl-border-2); border-radius: 22px; padding: 24px 26px; box-shadow: var(--vl-shadow-lg); display:flex; flex-direction:column; gap: 14px; }
  .modal h3 { font-family: var(--vl-font-display); font-size: 22px; font-style: italic; margin: 0; }
  .modal p { font-size: 13px; line-height: 1.5; color: var(--vl-fg-2); margin: 0; }
  .actions { display:flex; gap: 10px; justify-content: flex-end; padding-top: 6px; }
</style></head><body>
<div class="scrim">
  <div class="modal">
    <span class="vl-pill" style="align-self:flex-start; background:rgba(228,34,23,0.14); color:var(--vl-accent); border-color:rgba(228,34,23,0.40);">Heads up</span>
    <h3>Leave the lesson?</h3>
    <p>Your progress through Lesson 03 — Tracking — will be saved. You can pick up right where you left off.</p>
    <div class="actions">
      <button class="vl-btn vl-btn--ghost">Stay</button>
      <button class="vl-btn vl-btn--primary">Leave lesson</button>
    </div>
  </div>
</div>
</body></html>
