<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">

<div class="row">
  <span class="vl-pill">Q1 / 3</span>
  <span class="vl-pill">2:12</span>

</div>
<div class="row">
  <span class="eyebrow">01 — Color System</span>
