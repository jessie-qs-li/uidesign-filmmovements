<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--vl-font-mono); font-size: 10px; color: var(--vl-fg-3); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  p, label, small { margin: 0; }
  /* Slightly tighter modern feel */
  p { letter-spacing: -0.005em; }
  .eyebrow { font-family: var(--vl-font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.20em; text-transform: uppercase; color: var(--vl-fg-3); }
</style></head><body>
<div class="stack">
  <div class="row">
    <p>Watch the camera, not the actor. The frame slides sideways while the subject stays put — that's a pan.</p>
    <span class="spec">Geist · 16 / 24 · 400 · body</span>
  </div>
  <div class="row">
    <span class="eyebrow">Lesson 03 · Tracking</span>
    <span class="spec">Geist · 11 · 600 · 0.20em · eyebrow</span>
  </div>
  <div class="row">
    <small style="font-style:italic; color:var(--vl-fg-3)">Goodfellas, Scorsese (1990)</small>
    <span class="spec">Geist · 13 · italic · caption</span>
  </div>
</div>
</body></html>
