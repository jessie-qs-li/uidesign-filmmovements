<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .card { background: var(--vl-bg-2); border:1px solid var(--vl-border-1); border-radius: 18px; padding: 22px 24px; box-shadow: var(--vl-shadow-md); display: grid; grid-template-columns: 80px 1fr; gap: 22px; align-items:center; }
  .icon-tile { width:80px; height:80px; background: var(--vl-bg-3); border-radius:14px; display:flex;align-items:center;justify-content:center; }
  .icon-tile img { height: 56px; }
  .eyebrow { font-family: var(--vl-font-body); font-size: 11px; font-weight:700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--vl-fg-3); }
  h3.tag { font-family: var(--vl-font-display); font-style:italic; font-size: 16px; font-weight: 400; color: var(--vl-fg-2); margin: 4px 0 0; }
  h1.name { font-family: var(--vl-font-display); font-size: 28px; font-weight: 700; margin: 2px 0 6px; line-height: 1.1; }
  p.def { margin: 0; color: var(--vl-fg-2); font-size: 14px; line-height: 1.5; max-width: 460px; }
</style></head><body>
<div class="card">
  <div class="icon-tile"><img src="../assets/cam-dolly-zoom.png" alt=""></div>
  <div>
    <span class="eyebrow">04 — Camera Movement</span>
    <h1 class="name">Dolly Zoom</h1>
    <h3 class="tag">Feels like the room is shrinking around you.</h3>
    <p class="def">A dolly zoom keeps a subject in frame while changing perspective — the background warps but the subject stays the same size.</p>
  </div>
</div>
</body></html>
