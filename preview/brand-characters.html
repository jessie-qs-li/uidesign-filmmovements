<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 24px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; background: var(--vl-bg-2); border: 1px solid var(--vl-border-1); border-radius: 12px; padding: 10px 6px 8px; }
  .item img { height: 110px; width: auto; }
  .item span { font-family: var(--vl-font-mono); font-size: 10px; color: var(--vl-fg-3); text-transform: uppercase; letter-spacing: 0.06em; }
</style></head><body>
<div class="row">
  <div class="item"><img src="../assets/laura.png"><span>laura · hero</span></div>
  <div class="item"><img src="../assets/bob-happy.png"><span>bob · happy</span></div>
  <div class="item"><img src="../assets/bob-smirk.png"><span>bob · smirk</span></div>
  <div class="item"><img src="../assets/bob-neutral.png"><span>bob · neutral</span></div>
  <div class="item"><img src="../assets/bob-angry.png"><span>bob · angry</span></div>
</div>
</body></html>
