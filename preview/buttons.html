<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 16px; }
  .lbl { font-family: var(--vl-font-mono); font-size: 10px; color: var(--vl-fg-3); width: 80px; text-transform: uppercase; letter-spacing: 0.06em; }
</style></head><body>
<div class="row"><span class="lbl">Primary</span>
  <button class="vl-btn vl-btn--primary">Start →</button>
  <button class="vl-btn vl-btn--primary" style="box-shadow:var(--vl-glow-accent);background:#ff3a2d">Hover</button>
  <button class="vl-btn vl-btn--primary" style="transform:translateY(1px) scale(0.98)">Press</button>
</div>
<div class="row"><span class="lbl">Correct</span>
  <button class="vl-btn vl-btn--correct">Continue</button>
  <button class="vl-btn vl-btn--correct" style="box-shadow:var(--vl-glow-correct)">Hover</button>
</div>
<div class="row"><span class="lbl">Ghost</span>
  <button class="vl-btn vl-btn--ghost">Retry</button>
  <button class="vl-btn vl-btn--ghost" style="border-color:var(--vl-fg-1);background:rgba(242,242,238,0.04)">Hover</button>
</div>
</body></html>
