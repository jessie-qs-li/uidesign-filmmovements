<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 32px 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; align-items: end; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 92px; height: 60px; background: var(--vl-bg-2); border-radius: 12px; border: 1px solid var(--vl-border-1); }
  .lbl { font-family: var(--vl-font-mono); font-size: 10px; color: var(--vl-fg-2); }
</style></head><body>
<div class="grid">
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,0.4)"></div><span class="lbl">sm</span></div>
  <div class="item"><div class="box" style="box-shadow:0 4px 14px rgba(0,0,0,0.45)"></div><span class="lbl">md</span></div>
  <div class="item"><div class="box" style="box-shadow:0 18px 40px rgba(0,0,0,0.55)"></div><span class="lbl">lg</span></div>
  <div class="item"><div class="box" style="box-shadow:0 0 0 3px rgba(228,34,23,0.30)"></div><span class="lbl">glow accent</span></div>
  <div class="item"><div class="box" style="box-shadow:0 0 0 3px rgba(169,237,61,0.35)"></div><span class="lbl">glow correct</span></div>
</div>
</body></html>
