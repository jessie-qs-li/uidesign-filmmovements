<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 50px 1fr 80px; align-items: center; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--vl-border-1); }
  .row:last-child { border-bottom: 0; }
  .tok { font-family: var(--vl-font-mono); font-size: 11px; color: var(--vl-fg-2); }
  .bar { height: 14px; background: var(--vl-highlight); border-radius: 3px; }
  .px { font-family: var(--vl-font-mono); font-size: 11px; color: var(--vl-fg-3); text-align: right; }
</style></head><body>
<div class="row"><span class="tok">--1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
<div class="row"><span class="tok">--2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
<div class="row"><span class="tok">--3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
<div class="row"><span class="tok">--4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
<div class="row"><span class="tok">--5</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
<div class="row"><span class="tok">--6</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
<div class="row"><span class="tok">--7</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
<div class="row"><span class="tok">--8</span><div class="bar" style="width:64px"></div><span class="px">64 px</span></div>
</body></html>
